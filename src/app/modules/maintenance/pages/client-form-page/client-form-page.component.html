<div class="container text-center">
  <div class="row">
    <div class="display-6 my-2">Cadastro de clientes</div>

    <div class="col border rounded shadow-sm p-4">

      <!-- inicio do formulario copiado do conception -->
      <!-- (alterei a ordem div-div-form para form-div-div) -->
      <form class="row" [formGroup]="formClient" #ngFormClient="ngForm">
        <div class="col-8 offset-2">
          <div class="row g-3">
      
            <div class="col-12">
              <label for="inputName" class="form-label">Nome Completo:</label>
              <input type="text" class="form-control" placeholder="Nome Completo" id="inputName" name="name" formControlName="name">
              <div *ngIf="ngFormClient.submitted" class="text-danger text-start">
                <small *ngIf="cfName?.errors?.['required']"><sup>*</sup>Nome obrigatório</small>
              </div>
            </div>
      
            <div class="col-6">
              <label for="inputPhone" class="form-label">Telefone:</label>
              <input type="text" class="form-control" placeholder="Telefone" id="inputPhone" name="phone" formControlName="phone">
              <div *ngIf="ngFormClient.submitted" class="text-danger text-start">
                <small *ngIf="cfPhone?.errors?.['required']"><sup>*</sup>Telefone obrigatório</small>
              </div>
            </div>
            <div class="col-6">
              <label for="inputBirthDate" class="form-label">Data de Nascimento:</label>
              <input type="date" class="form-control" placeholder="dd/mm/aaaa" id="inputBirthDate" name="dateOfBirth" formControlName="dateOfBirth">
              <div *ngIf="ngFormClient.submitted" class="text-danger text-start">
                <small *ngIf="cfDateOfBirth?.errors?.['required']"><sup>*</sup>Data de nascimento brigatória</small>
              </div>
            </div>
      
            <div class="col text-end">
              <button type="button" class="btn btn-secondary me-1" (click)="cancel()">Cancelar</button>
              <button type="submit" class="btn btn-primary" [disabled]="!formClient.dirty" (click)="saveClient()">Salvar</button>
            </div>
      
          </div>
        </div>
      </form>

    </div>
  </div>
</div>
